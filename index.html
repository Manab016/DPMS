<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন - কমিটি ম্যানেজমেন্ট সিস্টেম</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fcf8f2] min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="w-full max-w-sm mx-auto flex flex-col items-center">
        
        <!-- ক্লাবের লোগো -->
        <div class="mb-4 text-center">
            <img src="https://i.ibb.co.com/84w2N9Z/logo.png" alt="Club Logo" id="loginLogo" class="w-28 h-28 object-contain mx-auto rounded-full shadow-md border-2 border-orange-200 bg-white p-1" onerror="this.src='https://via.rect/150?text=Logo'">
        </div>

        <!-- কমিটি ম্যানেজমেন্ট সিস্টেম ব্যাজ -->
        <div class="bg-gradient-to-r from-amber-100 via-amber-50 to-orange-100 text-orange-800 font-bold text-sm md:text-base px-6 py-2 rounded-xl shadow-sm border border-orange-200 mb-6 text-center tracking-wide">
            কমিটি ম্যানেজমেন্ট সিস্টেম
        </div>

        <!-- লগইন ফর্ম বক্স -->
        <div class="bg-white w-full p-6 rounded-2xl shadow-xl border border-orange-100 relative">
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                
                <!-- ইউজার আইডি / ইমেইল -->
                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-700 mb-1.5">ইউজার আইডি / ইমেইল</label>
                    <input type="text" id="loginEmail" required placeholder="আপনার ইউজার আইডি বা ইমেইল লিখুন" class="w-full p-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-orange-500 focus:bg-white transition">
                </div>

                <!-- পাসওয়ার্ড -->
                <div class="mb-6 relative">
                    <label class="block text-xs font-bold text-gray-700 mb-1.5">পাসওয়ার্ড</label>
                    <div class="relative">
                        <input type="password" id="loginPassword" required placeholder="আপনার পাসওয়ার্ড লিখুন" class="w-full p-3 pr-10 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-orange-500 focus:bg-white transition">
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600 focus:outline-none text-sm">
                            👁️
                        </button>
                    </div>
                </div>

                <!-- লগইন বাটন -->
                <button type="submit" id="loginBtn" class="w-full bg-gradient-to-r from-orange-600 to-amber-600 text-white font-bold py-3 rounded-xl shadow-md hover:from-orange-700 hover:to-amber-700 transition duration-200 text-sm tracking-wide">
                    লগইন করুন
                </button>

            </form>

            <!-- ডেটাবেস সংযোগ পরীক্ষা সেকশন -->
            <div class="mt-6 pt-4 border-t border-gray-100 text-center">
                <p class="text-[11px] text-gray-500 mb-2">ডেটাবেস সমস্যা হলে:</p>
                <button onclick="checkDatabaseConnection()" class="inline-flex items-center gap-1.5 px-4 py-1.5 bg-gray-50 border border-gray-200 rounded-lg text-xs font-semibold text-gray-700 hover:bg-gray-100 transition shadow-sm">
                    🔍 সংযোগ পরীক্ষা
                </button>
            </div>

        </div>
    </div>

    <!-- Firebase এবং লজিক স্ক্রিপ্ট -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByG-eBGnsUMX1zchs8sJV9MNZL-Sx0Nqs",
            authDomain: "durgapuja-2026.firebaseapp.com",
            projectId: "durgapuja-2026",
            storageBucket: "durgapuja-2026.firebasestorage.app",
            messagingSenderId: "625976130920",
            appId: "1:625976130920:web:60190b21f1c7563cdd2add"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // যদি ইউজার আগে থেকেই লগইন করা থাকে, সরাসরি ড্যাশবোর্ডে পাঠিয়ে দেবে
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.replace("dashboard.html");
            }
        });

        // লগইন হ্যান্ডলার
        window.handleLogin = function(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.innerText = "লগইন হচ্ছে...";
            loginBtn.disabled = true;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    window.location.replace("dashboard.html");
                })
                .catch((error) => {
                    alert("লগইন ব্যর্থ হয়েছে! সঠিক ইউজার আইডি ও পাসওয়ার্ড দিন।\nত্রুটি: " + error.message);
                    loginBtn.innerText = "লগইন করুন";
                    loginBtn.disabled = false;
                });
        }

        // ডেটাবেস সংযোগ পরীক্ষা ফাংশন
        window.checkDatabaseConnection = function() {
            if (navigator.onLine) {
                alert("ইন্টারনেট সংযোগ সক্রিয় আছে এবং ফায়ারবেস ডেটাবেস প্রস্তুত রয়েছে।");
            } else {
                alert("আপনার ইন্টারনেট সংযোগ বিচ্ছিন্ন রয়েছে! দয়া করে ইন্টারনেট অন করুন।");
            }
        }
    </script>

    <!-- পাসওয়ার্ড শো/হাইড স্ক্রিপ্ট -->
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('loginPassword');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }
    </script>
</body>
</html>
